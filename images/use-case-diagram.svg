<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <!-- Background -->
  <rect width="700" height="500" fill="white"/>

  <!-- Tizim chegarasi -->
  <rect x="200" y="20" width="350" height="460" fill="none" stroke="black" stroke-width="2" rx="10"/>
  <text x="375" y="45" text-anchor="middle" font-family="Times New Roman" font-size="14" font-weight="bold">Muzqaymoq do'koni boshqaruv tizimi</text>

  <!-- Use Case ellipslar (havorang) -->
  <!-- Tizimga kirish -->
  <ellipse cx="375" cy="85" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="90" text-anchor="middle" font-family="Times New Roman" font-size="11">Tizimga kirish</text>

  <!-- Mahsulotlar boshqarish -->
  <ellipse cx="375" cy="150" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="155" text-anchor="middle" font-family="Times New Roman" font-size="11">Mahsulotlar boshqarish</text>

  <!-- Buyurtma yaratish -->
  <ellipse cx="375" cy="215" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="220" text-anchor="middle" font-family="Times New Roman" font-size="11">Buyurtma yaratish</text>

  <!-- Hisobotlar ko'rish -->
  <ellipse cx="375" cy="280" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="285" text-anchor="middle" font-family="Times New Roman" font-size="11">Hisobotlar ko'rish</text>

  <!-- Foydalanuvchilar boshqarish -->
  <ellipse cx="375" cy="345" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="350" text-anchor="middle" font-family="Times New Roman" font-size="11">Foydalanuvchilar boshqarish</text>

  <!-- Omborxona nazorati -->
  <ellipse cx="375" cy="410" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="415" text-anchor="middle" font-family="Times New Roman" font-size="11">Omborxona nazorati</text>

  <!-- Chek chop etish -->
  <ellipse cx="375" cy="455" rx="90" ry="25" fill="#add8e6" stroke="black" stroke-width="1.5"/>
  <text x="375" y="460" text-anchor="middle" font-family="Times New Roman" font-size="11">Chek chop etish</text>

  <!-- Aktor 1: Administrator (chapda yuqori) -->
  <!-- Stick figure -->
  <circle cx="80" cy="100" r="15" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="115" x2="80" y2="160" stroke="black" stroke-width="1.5"/>
  <line x1="55" y1="135" x2="105" y2="135" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="160" x2="55" y2="190" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="160" x2="105" y2="190" stroke="black" stroke-width="1.5"/>
  <text x="80" y="210" text-anchor="middle" font-family="Times New Roman" font-size="12" font-weight="bold">Administrator</text>

  <!-- Aktor 2: Menejer (chapda o'rta) -->
  <circle cx="80" cy="280" r="15" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="295" x2="80" y2="340" stroke="black" stroke-width="1.5"/>
  <line x1="55" y1="315" x2="105" y2="315" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="55" y2="370" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="105" y2="370" stroke="black" stroke-width="1.5"/>
  <text x="80" y="390" text-anchor="middle" font-family="Times New Roman" font-size="12" font-weight="bold">Menejer</text>

  <!-- Aktor 3: Sotuvchi (chapda pastda) -->
  <circle cx="80" cy="430" r="15" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="445" x2="80" y2="480" stroke="black" stroke-width="1.5"/>
  <line x1="55" y1="460" x2="105" y2="460" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="480" x2="55" y2="500" stroke="black" stroke-width="1.5"/>
  <line x1="80" y1="480" x2="105" y2="500" stroke="black" stroke-width="1.5"/>
  <text x="80" y="518" text-anchor="middle" font-family="Times New Roman" font-size="12" font-weight="bold">Sotuvchi</text>

  <!-- Administrator chiziqlar (barcha use case'larga) -->
  <line x1="105" y1="130" x2="285" y2="85" stroke="black" stroke-width="1"/>
  <line x1="105" y1="140" x2="285" y2="150" stroke="black" stroke-width="1"/>
  <line x1="105" y1="155" x2="285" y2="215" stroke="black" stroke-width="1"/>
  <line x1="110" y1="165" x2="285" y2="280" stroke="black" stroke-width="1"/>
  <line x1="110" y1="175" x2="285" y2="345" stroke="black" stroke-width="1"/>
  <line x1="110" y1="185" x2="285" y2="410" stroke="black" stroke-width="1"/>

  <!-- Menejer chiziqlar -->
  <line x1="105" y1="290" x2="285" y2="85" stroke="black" stroke-width="1"/>
  <line x1="105" y1="300" x2="285" y2="150" stroke="black" stroke-width="1"/>
  <line x1="105" y1="310" x2="285" y2="215" stroke="black" stroke-width="1"/>
  <line x1="105" y1="320" x2="285" y2="280" stroke="black" stroke-width="1"/>
  <line x1="105" y1="340" x2="285" y2="410" stroke="black" stroke-width="1"/>

  <!-- Sotuvchi chiziqlar -->
  <line x1="105" y1="440" x2="285" y2="85" stroke="black" stroke-width="1"/>
  <line x1="105" y1="450" x2="285" y2="215" stroke="black" stroke-width="1"/>
  <line x1="105" y1="460" x2="285" y2="455" stroke="black" stroke-width="1"/>
</svg>
