<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish - Muzqaymoq Do'koni</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍦</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">🍦</div>
      <h1 class="login-title">Muzqaymoq Do'koni</h1>
      <p class="login-subtitle">Boshqaruv tizimiga kirish</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="login">Foydalanuvchi nomi</label>
          <input type="text" id="login" placeholder="Login kiriting" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="parol">Parol</label>
          <input type="password" id="parol" placeholder="Parolni kiriting" required autocomplete="current-password">
        </div>

        <div class="form-group">
          <label for="rol">Rol tanlang</label>
          <select id="rol">
            <option value="admin">Administrator</option>
            <option value="menejer">Menejer</option>
            <option value="sotuvchi">Sotuvchi</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Kirish</button>
      </form>

      <div class="login-hint">
        <p>Test ma'lumotlari:</p>
        <p>Admin: admin / admin123</p>
        <p>Menejer: menejer / menejer123</p>
        <p>Sotuvchi: sotuvchi / sotuvchi123</p>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Agar allaqachon kirgan bo'lsa, dashboard ga yo'naltirish
      if (Auth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      var form = document.getElementById('loginForm');
      var errorEl = document.getElementById('loginError');

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        var login = document.getElementById('login').value.trim();
        var parol = document.getElementById('parol').value.trim();

        if (!login || !parol) {
          errorEl.textContent = "Login va parolni kiriting!";
          errorEl.classList.add('show');
          return;
        }

        var result = Auth.login(login, parol);

        if (result.success) {
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = result.message;
          errorEl.classList.add('show');
        }
      });
    });
  </script>
</body>
</html>
